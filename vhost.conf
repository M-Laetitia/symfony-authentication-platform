<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        AllowOverride All
        Order Allow,Deny
        Allow from All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    Header set Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; script-src 'self' 'unsafe-inline' https://consent.cookiebot.com https://mosaic.digitics.fr https://js.stripe.com; style-src 'self' 'unsafe-inline' https://mosaic.digitics.fr; font-src 'self' data:; connect-src 'self' https://mosaic.digitics.fr https://js.stripe.com https://api.mercure.rocks https://mercure.digitics.fr; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
</VirtualHost>
